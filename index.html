<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Boss Nim 3.0.2 - Live Quota</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; background: #1a1a2e; color: #fff; margin: 0; padding: 20px; }
        #lock-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a2e; z-index: 2000; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .row { margin: 10px auto; padding: 15px; background: #16213e; border-radius: 12px; border: 2px solid #0f3460; max-width: 600px; min-height: 60px; }
        .coin { width: 35px; height: 35px; background: radial-gradient(circle, #f1c40f, #f39c12); border-radius: 50%; display: inline-block; margin: 5px; border: 2px solid #d35400; cursor: pointer; transition: 0.2s; }
        .coin.selected { background: #ff4500 !important; border-color: #fff; transform: scale(1.1); box-shadow: 0 0 15px #ff4500; }
        .coin.bot-picking { background: #e74c3c !important; transform: scale(1.2); box-shadow: 0 0 15px #ff0000; }
        #timer { font-size: 60px; font-weight: bold; color: #e74c3c; margin: 10px; }
        #status { font-size: 24px; color: #4eeaff; margin-bottom: 20px; font-weight: bold; min-height: 35px; }
        #live-quota { background: #9b59b6; padding: 10px; border-radius: 8px; display: inline-block; margin-bottom: 15px; font-weight: bold; border: 1px solid #fff; }
        button { padding: 12px 25px; font-size: 16px; cursor: pointer; background: #34495e; color: white; border: none; border-radius: 8px; font-weight: bold; margin: 5px; }
        .btn-confirm { background: #2ecc71; } .btn-confirm:hover:not(:disabled) { background: #27ae60; }
        .btn-pause { background: #f39c12; }
        input { padding: 12px; font-size: 18px; border-radius: 8px; border: none; margin: 10px; text-align: center; }
        #limit-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>
    <div id="lock-screen">
        <h2 style="color: #4eeaff;">🔑 กรุณากรอกรหัสผ่านเพื่อเข้าเรียน</h2>
        <input type="password" id="pass-input" placeholder="รหัสผ่านจากกลุ่ม">
        <button onclick="checkPass()">เริ่มบทเรียน</button>
    </div>

    <div id="limit-overlay">
        <h1 style="color: #e74c3c;">⚠️ จบการทดลองเรียนฟรี 50 ตาแล้วค่ะ!</h1>
        <p style="font-size: 20px;">บันทึกการเรียนครบถ้วนแล้ว เจ้านายเก่งมากค่ะ!</p>
        <p style="color: #f1c40f;">หากต้องการเรียนต่อ โปรดติดต่อผู้ดูแลนะค่ะ</p>
    </div>

    <h1>🎮 Boss Nim: Master Class v3.0.2</h1>
    <div id="live-quota">บันทึกการเรียน: <span id="quota-display">0</span> / 50 ตา</div>
    <div id="status">ยินดีต้อนรับค่ะ!</div>
    <div id="timer">15</div>
    <div id="game-board"></div>
    <div class="controls">
        <button id="confirm-btn" class="btn-confirm" onclick="confirmMove()" disabled>ยืนยันหมาก (Confirm)</button>
        <button id="clear-btn" onclick="clearSelection()" disabled>ล้างการเลือก</button>
        <button id="pause-btn" class="btn-pause" onclick="togglePause()">หยุดชั่วคราว (Pause)</button>
        <button id="reset-btn" onclick="manualReset()">เริ่มตาใหม่</button>
    </div>

    <script>
        const SECRET_KEY = "NIMBASIC2026"; 
        const STORAGE_KEY = "_user_lesson_progress_"; 
        const MAX_PLAYS = 50;

        let rows = [];
        let selection = { row: -1, count: 0 };
        let timeLeft = 15, timerInterval, isBotTurn = false, isPaused = false, isGameOver = false;
        let hasCountedThisGame = false;

        let playCount = parseInt(localStorage.getItem(STORAGE_KEY)) || 0;

        function updateQuotaUI() {
            document.getElementById('quota-display').innerText = playCount;
            if (playCount >= MAX_PLAYS) {
                document.getElementById('limit-overlay').style.display = 'flex';
                clearInterval(timerInterval);
                return true;
            }
            return false;
        }

        function checkPass() {
            const input = document.getElementById('pass-input').value;
            if (input === SECRET_KEY) {
                document.getElementById('lock-screen').style.display = 'none';
                updateQuotaUI();
                manualReset();
            } else {
                alert("รหัสผ่านไม่ถูกต้องค่ะ!");
            }
        }

        function togglePause() {
            if (isGameOver) return;
            isPaused = !isPaused;
            document.getElementById('pause-btn').innerText = isPaused ? "เล่นต่อ (Resume)" : "หยุดชั่วคราว (Pause)";
            document.getElementById('status').innerText = isPaused ? "⏸️ หยุดชั่วคราว..." : (isBotTurn ? "ดิฉันกำลังเดิน..." : "ตาเจ้านายค่ะ!");
            render();
        }

        function render(botRow = -1, botPick = 0) {
            const board = document.getElementById('game-board');
            if (!board) return; board.innerHTML = '';
            rows.forEach((count, rowIndex) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row';
                rowDiv.innerHTML = `แถว ${rowIndex + 1}: `;
                for (let i = 0; i < count; i++) {
                    const coin = document.createElement('div');
                    coin.className = 'coin';
                    if (!isBotTurn && !isGameOver && !isPaused) {
                        if (selection.row === -1 || selection.row === rowIndex) {
                            if (selection.row === rowIndex && i >= count - selection.count) coin.className += ' selected';
                            coin.onclick = () => handleSelect(rowIndex);
                        }
                    }
                    rowDiv.appendChild(coin);
                }
                if (rowIndex === botRow) {
                    for (let k = 0; k < botPick; k++) {
                        const bc = document.createElement('div');
                        bc.className = 'coin bot-picking';
                        rowDiv.appendChild(bc);
                    }
                }
                board.appendChild(rowDiv);
            });
        }

        function handleSelect(rowIndex) {
            if (isBotTurn || isGameOver || isPaused) return;
            if (selection.row !== -1 && selection.row !== rowIndex) return;
            selection.row = rowIndex;
            selection.count = (selection.count < rows[rowIndex]) ? selection.count + 1 : 1;
            document.getElementById('confirm-btn').disabled = false;
            document.getElementById('clear-btn').disabled = false;
            render();
        }

        function confirmMove() {
            if (isBotTurn || isGameOver || isPaused || selection.row === -1) return;
            if (!hasCountedThisGame) {
                playCount++;
                hasCountedThisGame = true;
                localStorage.setItem(STORAGE_KEY, playCount);
                if (updateQuotaUI()) return;
            }
            rows[selection.row] -= selection.count;
            clearSelection();
            if (rows.every(r => r === 0)) return checkWin("เจ้านาย");
            isBotTurn = true;
            clearInterval(timerInterval);
            document.getElementById('status').innerText = "ดิฉันกำลังแก้เกม...";
            render();
            setTimeout(computerMove, 1000);
        }

        function clearSelection() {
            selection = { row: -1, count: 0 };
            document.getElementById('confirm-btn').disabled = true;
            document.getElementById('clear-btn').disabled = true;
            render();
        }

        async function computerMove() {
            if (isGameOver) return;
            let nimSum = rows.reduce((a, b) => a ^ b, 0);
            let rIdx = -1, pAmt = 0;
            let heapsOverOne = rows.filter(r => r > 1).length;
            if (heapsOverOne <= 1) {
                let totalHeaps = rows.filter(r => r > 0).length;
                let heapIdx = rows.findIndex(r => r > 1);
                if (heapIdx === -1) { rIdx = rows.findIndex(r => r > 0); pAmt = 1; }
                else { let otherHeaps = totalHeaps - 1; pAmt = (otherHeaps % 2 === 0) ? rows[heapIdx] - 1 : rows[heapIdx]; rIdx = heapIdx; }
            } else if (nimSum > 0) {
                for (let i = 0; i < rows.length; i++) {
                    let target = rows[i] ^ nimSum;
                    if (target < rows[i]) { rIdx = i; pAmt = rows[i] - target; break; }
                }
            } else { rIdx = rows.findIndex(r => r > 0); pAmt = 1; }

            if (rIdx !== -1) { rows[rIdx] -= pAmt; render(rIdx, pAmt); await new Promise(r => setTimeout(r, 1200)); }
            isBotTurn = false; render();
            if (rows.every(r => r === 0)) return checkWin("ดิฉัน");
            timeLeft = 15; document.getElementById('status').innerText = isPaused ? "⏸️ หยุดชั่วคราว..." : "ตาเจ้านายแล้วค่ะ!";
            if (!isPaused) startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            document.getElementById('timer').innerText = timeLeft;
            timerInterval = setInterval(() => {
                if (!isBotTurn && !isGameOver && !isPaused) {
                    timeLeft--;
                    document.getElementById('timer').innerText = timeLeft;
                    if (timeLeft <= 0) { clearInterval(timerInterval); isGameOver = true; alert("หมดเวลา! ดิฉันชนะค่ะ!"); manualReset(); }
                }
            }, 1000);
        }

        function checkWin(p) {
            clearInterval(timerInterval);
            isGameOver = true;
            setTimeout(() => { alert(`🏁 จบเกม! ${p} แพ้ค่ะ!`); manualReset(); }, 200);
        }

        function manualReset() {
            if (updateQuotaUI()) return;
            hasCountedThisGame = false;
            clearInterval(timerInterval);
            rows = Array.from({length: 5}, () => Math.floor(Math.random() * 5) + 1);
            selection = { row: -1, count: 0 };
            isBotTurn = false; isPaused = false; isGameOver = false; timeLeft = 15;
            document.getElementById('pause-btn').innerText = "หยุดชั่วคราว (Pause)";
            render();
            const first = Math.floor(Math.random() * 2);
            if (first === 1) { 
                isBotTurn = true; document.getElementById('status').innerText = "ดิฉันเริ่มก่อนนะค่ะ!"; 
                playCount++; hasCountedThisGame = true;
                localStorage.setItem(STORAGE_KEY, playCount);
                updateQuotaUI();
                setTimeout(computerMove, 1000); 
            } else { document.getElementById('status').innerText = "เจ้านายเริ่มก่อน!"; startTimer(); }
        }
    </script>
</body>
</html>
